name=AlloyLogger
version=0.4.0
author=Hugh Phan
maintainer=Hugh Phan <hugh@usealloy.ai>
sentence=Stream Arduino sensor & telemetry data directly to Alloy (usealloy.ai).
paragraph=Dead-simple, non-blocking, RAM-buffered logging from ESP32 to the Alloy data platform. Log name/value pairs at the call site, or watch() pins/variables and have them sampled and streamed for you with no code in loop(). Every power-on becomes one MCAP mission in Alloy (replay, SQL, missions) via AlloyLogger Cloud, with store-and-forward and zero flash wear. No SD card. Alloy AI reasons over your tags, field names, and values.
category=Communication
url=https://github.com/hughminhphan/alloy-logger-arduino
architectures=esp32
depends=ArduinoJson
